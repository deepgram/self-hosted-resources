### Deepgram Engine configuration for Google Cloud Run — STT (nova-2 / nova-3)
###
### This configuration is for Speech-to-Text workloads only.
### An NVIDIA L4 GPU can host up to 5 concurrent nova-2/nova-3 model files.
###
### For Flux or Aura TTS workloads, use their dedicated config files:
###   config/engine-flux.toml  — Flux turn-based streaming STT
###   (TTS engine config is provided by your Deepgram Account Representative)
###
### Keep in mind that all paths are in-container paths and do not need to exist
### on the host machine.

### Limit the number of active requests handled by a single Engine container.
### Engine will reject additional requests from API beyond this limit, and the
### API container will continue with the retry logic configured in api.toml.
###
### For an NVIDIA L4 GPU, a reasonable starting value is 8–16 for STT streaming.
### Tune this based on your model and workload.
### NOTE: This setting does NOT apply to Flux streams — use flux.max_streams instead.
# max_active_requests =


### Configure license validation by passing in a DEEPGRAM_API_KEY environment variable.
### See https://developers.deepgram.com/docs/deploy-deepgram-services#credentials
[license]
server_url = ["https://license.deepgram.com"]


### Configure the server to listen for requests from the API.
[server]
### Listen on all interfaces inside the container.
host = "0.0.0.0"
### Cloud Run expects the container to listen on port 8080.
port = 8080


### Metrics server for Prometheus-compatible scraping.
### Note: In Cloud Run, port 9991 is not exposed by the load balancer.
### Metrics are accessible only within the container or via Cloud Run sidecar patterns.
[metrics_server]
host = "0.0.0.0"
port = 9991


[model_manager]
### The number of models to have concurrently loaded in system memory.
### If managing a deployment with dozens of models this setting will
### help prevent instances where models consume too much memory and
### offload the models to disk as needed on a least-recently-used basis.
###
### For an NVIDIA L4 GPU running nova-2/nova-3, up to 5 models can be loaded
### concurrently on the same GPU. Set this to 5 or fewer to prevent OOM errors
### when hosting multiple nova variants.
###
### The default is no limit.
# max_concurrently_loaded_models = 5

### Inference model search path — matches the GCS FUSE mount point set in engine.service.yaml.
search_paths = ["/models"]


### Enable ancillary features
[features]
### Allow multichannel requests by setting this to true, set to false to disable
multichannel = true # or false
### Enables language detection *if* a valid language detection model is available
language_detection = true # or false
### Enables streaming entity formatting *if* a valid NER model is available
streaming_ner = true # or false
### Enables use of 36-language detection model
use_v2_language_detection = false


### Flux must NOT be enabled in this STT engine configuration.
###
### Flux requires a fully dedicated Engine instance with no other models present.
### Enabling Flux alongside nova-2/nova-3 models causes CUDA out-of-memory errors
### and will crash the Engine. Use config/engine-flux.toml with the dedicated
### engine-flux.service.yaml Cloud Run service instead.
###
### See: https://developers.deepgram.com/docs/flux-self-hosted
[flux]
enabled = false


### Size of audio chunks to process in seconds.
[chunking.batch]
# min_duration =
# max_duration =
[chunking.streaming]
# min_duration =
# max_duration =


### How often to return interim results, in seconds. Default is 1.0s.
# step = 1.0


### Pre-load models into GPU memory at startup to reduce request latency.
### Blocking startup on preload prevents Cloud Run from sending traffic until models
### are ready, which is recommended for GPU deployments.
[preload_models]
blocking = true


[health]
### Fail on startup if no GPU is detected.
### In Cloud Run GPU deployments this should always be true.
gpu_required = true # or false
